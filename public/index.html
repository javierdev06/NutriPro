<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriPro</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <div class="contenedor">
    <h1>NutriPro</h1>
    <p id="estado-backend">Conectando...</p>

    <div class="prueba-usuario">
      <input type="text" id="input-nombre" placeholder="Tu nombre">
      <button id="btn-crear-usuario">Crear usuario de prueba</button>
      <p id="resultado-usuario"></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    verificarBackend();

    document.getElementById('btn-crear-usuario').addEventListener('click', async () => {
      const nombre = document.getElementById('input-nombre').value;
      const resultado = await crearUsuarioPrueba(nombre);
      document.getElementById('resultado-usuario').textContent = JSON.stringify(resultado);
    });
  </script>
</body>
</html>
